name: Publish npm package

# Publishes @suveren/gateway to the npm registry on tagged
# releases. Runs in parallel with publish.yml (Docker image) so a single
# `git tag vX.Y.Z && git push --tags` ships both distribution channels
# in lockstep.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # for npm provenance

    steps:
      - uses: actions/checkout@v6

      # The npm bundle ships the profile catalog from hap-profiles (the single
      # source of truth — not vendored). Without this, build.mjs ships empty
      # profiles and the gateway rejects every gated action (the 0.2.8 bug).
      - name: Check out profile catalog
        uses: actions/checkout@v6
        with:
          repository: humanagencyprotocol/hap-profiles
          path: .hap-profiles

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Upgrade npm
        # Node 20 ships with npm 10.x; Trusted Publishing (OIDC) requires
        # npm 11.5+ for the publish flow to recognize the OIDC token
        # instead of expecting a bearer token from .npmrc.
        run: npm install -g npm@latest

      - name: Install workspace deps
        run: pnpm install --frozen-lockfile

      - name: Build apps
        run: pnpm build

      - name: Assemble bundle
        run: node bundle/build.mjs
        env:
          HAP_PROFILES_SRC: ${{ github.workspace }}/.hap-profiles

      - name: Verify bundle version matches git tag
        run: |
          set -e
          TAG="${GITHUB_REF_NAME#v}"
          BUNDLE_VERSION=$(jq -r .version bundle/dist/package.json)
          echo "git tag: v$TAG"
          echo "bundle:  $BUNDLE_VERSION"
          if [ "$TAG" != "$BUNDLE_VERSION" ]; then
            echo "::error::Bundle version ($BUNDLE_VERSION) does not match git tag ($TAG)."
            echo "::error::Update package.json (root) before tagging."
            exit 1
          fi

      - name: Smoke-install bundle
        # Confirms the published artifact is actually installable before
        # we hand it to the registry.
        working-directory: bundle/dist
        run: npm install --omit=dev --no-audit --no-fund

      - name: Publish to npm
        # Trusted Publishing via OIDC — no NPM_TOKEN secret. Configured at
        # https://www.npmjs.com/package/@suveren/gateway (Trusted Publishers).
        # The `id-token: write` permission on this job lets npm verify the
        # OIDC claim that the publish is coming from this workflow file.
        working-directory: bundle/dist
        run: npm publish --access public --provenance
