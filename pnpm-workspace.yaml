packages:
  - 'packages/*'
  - 'apps/*'

# Approve esbuild's postinstall script. Newer pnpm versions error
# on ERR_PNPM_IGNORED_BUILDS during CI install when this list is
# missing or read from package.json only. Setting it here in the
# workspace config covers every pnpm version we've seen in the
# Docker build (`corepack prepare pnpm@latest --activate` pulls a
# fresh pnpm each run, and the field location moved across majors).
onlyBuiltDependencies:
  - esbuild
